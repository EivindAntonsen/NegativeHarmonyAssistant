name: CI/CD

on:
  push:
    branches: [ '**' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          
      - name: Restore dependencies
        run: dotnet restore
        
      - name: Build
        run: dotnet build --no-restore --configuration Release
        
      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  publish:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            suffix: .exe
          - os: ubuntu-latest
            runtime: linux-x64
            suffix: ""
          - os: macos-latest
            runtime: osx-x64
            suffix: ""
            
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          
      - name: Publish
        run: >
          dotnet publish NegativeHarmonyAssistant/NegativeHarmonyAssistant.csproj 
          --configuration Release 
          --runtime ${{ matrix.runtime }} 
          --self-contained true 
          -p:PublishSingleFile=true 
          -p:PublishReadyToRun=true 
          -o ./publish/${{ matrix.runtime }}

      - name: Package (Zip/Tar)
        shell: pwsh
        run: |
          $runtime = "${{ matrix.runtime }}"
          $suffix = "${{ matrix.suffix }}"
          $artifactName = "NegativeHarmonyAssistant-$runtime"
          
          if ($IsWindows) {
              Compress-Archive -Path "./publish/$runtime/NegativeHarmonyAssistant$suffix" -DestinationPath "./$artifactName.zip"
          } else {
              tar -czf "./$artifactName.tar.gz" -C "./publish/$runtime" "NegativeHarmonyAssistant"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.runtime }}
          path: NegativeHarmonyAssistant-${{ matrix.runtime }}.*

  release:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts
          pattern: binary-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
